name: NPM CI

on:
  push:
    branches: [main]
    paths:
      - "bin/**"
      - "test/**"
      - "plugins/omo/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/npm-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "bin/**"
      - "test/**"
      - "plugins/omo/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/npm-ci.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-pack:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Dry-run package
        run: npm pack --dry-run --json
